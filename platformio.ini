[platformio]
src_dir = ESP32-DIV/ESP32-DIV
include_dir = ESP32-DIV/ESP32-DIV

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = +<*> +<../ESP32-DIV/ESP32-DIV/*.ino>

lib_deps =
    # Дисплей и тачскрин
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    
    # Радио и связь
    nrf24/RF24@^1.4.7
    links2004/WebSockets@^2.4.1
    h2zero/NimBLE-Arduino@^1.4.1
    lsatan/Smartrc-CC1101-Driver-Lib@^3.0.1
    
    # Данные (фиксируем 6-ю версию, как в коде)
    bblanchon/ArduinoJson@6.21.3
    
    # Остальное
    xreef/PCF8574 library@^2.3.4
    zinggjm/GxEPD@^3.1.3
    kosme/arduinoFFT@^1.6.0

build_flags =
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_MISO=19
    -D TFT_MOSI=23
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TOUCH_CS=21
    
